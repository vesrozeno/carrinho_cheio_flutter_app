name: carrinho_cheio
description: "Seu app para criação de listas!"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_secure_storage: ^10.3.1
  flutter_validators: ^1.2.0
  get_it: ^9.2.1
  toastification: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/fonts/
    - assets/images/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-VariableFont_wght.ttf

        - asset: assets/fonts/Montserrat-Italic-VariableFont_wght.ttf
          style: italic
